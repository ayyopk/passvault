<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#08111f">
  <title>PassVault 1.1.4</title>
  <style>
    :root{
      --bg:#08111f;--panel:#101b2d;--panel2:#142238;--line:#263750;
      --text:#f4f7fb;--muted:#8ea1bb;--green:#36d399;--green2:#19b97f;
      --red:#fb7185;--yellow:#fbbf24;--blue:#60a5fa;--radius:16px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;background:linear-gradient(145deg,#07101d,#0e1c2f);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif}
    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    .hidden{display:none!important}
    .app{min-height:100vh;display:flex;flex-direction:column}
    .topbar{height:68px;padding:0 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--line);
      background:rgba(8,17,31,.92);backdrop-filter:blur(14px);position:sticky;top:0;z-index:20}
    .brand{font-weight:800;font-size:20px;white-space:nowrap}.brand span{color:var(--green)}
    .version{font-size:12px;color:var(--muted);margin-left:6px}
    .search-wrap{flex:1;max-width:620px;position:relative}
    .search{width:100%;height:42px;border-radius:12px;border:1px solid var(--line);background:#0c1727;color:var(--text);
      padding:0 14px 0 40px;outline:none;font-size:15px}
    .search:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(54,211,153,.14)}
    .search-icon{position:absolute;left:14px;top:11px;color:var(--muted)}
    .search-back{display:none;position:absolute;border:1px solid #315272;background:#142943;color:#dfffee;
      align-items:center;justify-content:center;border-radius:12px;padding:0}
    .search-back:hover{background:#1b3856;border-color:var(--green)}
    .return-arrow-icon{width:27px;height:27px;fill:currentColor;filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
    .top-actions{margin-left:auto;display:flex;gap:8px}
    .btn{height:40px;border-radius:10px;border:1px solid var(--line);padding:0 14px;background:#122138;color:var(--text)}
    .btn:hover{background:#172943}.btn.primary{background:var(--green);border-color:var(--green);color:#052e23;font-weight:800}
    .btn.primary:hover{background:var(--green2)}.btn.danger{color:#fecdd3}.btn.ghost{background:transparent}
    .layout{display:grid;grid-template-columns:230px minmax(280px,1fr) minmax(320px,430px);gap:14px;padding:14px;flex:1;min-height:0}
    .panel{background:rgba(16,27,45,.88);border:1px solid var(--line);border-radius:var(--radius);min-height:0;overflow:hidden}
    .sidebar{display:flex;flex-direction:column}.panel-head{padding:16px;border-bottom:1px solid var(--line);font-weight:700}
    .folders{padding:10px;overflow:auto}.folder{width:100%;border:none;background:transparent;color:var(--text);display:flex;
      align-items:center;justify-content:space-between;padding:11px 12px;border-radius:10px;text-align:left}
    .folder:hover,.folder.active{background:#192943}.folder small{color:var(--muted)}
    .list-panel{display:flex;flex-direction:column}.toolbar{padding:12px;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center}
    .status{font-size:12px;color:var(--muted);margin-left:auto}.items{overflow:auto;padding:10px}
    .item{border:1px solid transparent;border-radius:12px;padding:13px;margin-bottom:8px;background:#111f33;display:flex;gap:12px;align-items:center}
    .item:hover,.item.active{border-color:#36506e;background:#162741}.item .icon{width:38px;height:38px;border-radius:10px;background:#20334f;
      display:grid;place-items:center;font-weight:800}.item-main{min-width:0;flex:1}.item-title{font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-sub{font-size:12px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    mark{background:rgba(251,191,36,.28);color:#fff3c4;padding:0 .12em;border-radius:4px}
    .star{color:var(--yellow)}
    .detail{display:flex;flex-direction:column}.detail-body{padding:18px;overflow:auto}.detail-empty{height:100%;display:grid;place-items:center;color:var(--muted);text-align:center;padding:30px}
    .detail-title-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:20px}.detail-title{font-size:22px;font-weight:800;flex:1}
    .field{margin-bottom:14px}.field label{display:block;color:var(--muted);font-size:12px;margin-bottom:7px}
    .value-row{display:flex;gap:8px}.value,.edit-input,.edit-textarea,.edit-select{width:100%;min-height:44px;border-radius:10px;border:1px solid var(--line);
      background:#0d192a;color:var(--text);padding:11px 12px;overflow-wrap:anywhere}
    .value.mono,.edit-input.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.edit-textarea{min-height:100px;resize:vertical}
    .icon-btn{width:42px;min-width:42px;height:42px;border-radius:10px;border:1px solid var(--line);background:#13223a;color:var(--text)}
    .meta{font-size:12px;color:var(--muted);margin-top:18px;line-height:1.7}
    .notice{margin:14px;padding:12px 14px;border:1px solid #315272;background:#10243a;border-radius:12px;color:#c9d7e8;font-size:13px}
    .login{min-height:100vh;display:grid;place-items:center;padding:24px}
    .login-card{width:min(460px,100%);background:rgba(16,27,45,.95);border:1px solid var(--line);border-radius:22px;padding:28px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
    .login h1{margin:0 0 8px}.login p{color:var(--muted);line-height:1.6}.login-actions{display:grid;gap:10px;margin-top:20px}
    .file-label{display:flex;align-items:center;justify-content:center;height:46px;border:1px dashed #3b5573;border-radius:12px;background:#102039;cursor:pointer}
    .file-label:hover{border-color:var(--green)}.file-label input{display:none}
    .pass-row{display:flex;gap:8px;margin-top:12px}.pass-row input{flex:1;height:44px;border:1px solid var(--line);border-radius:10px;background:#0b1727;color:var(--text);padding:0 12px}
    .small{font-size:12px;color:var(--muted)}.danger-text{color:#fecdd3}.good-text{color:#86efac}
    .floating-toast{position:fixed;left:50%;bottom:88px;transform:translate(-50%,18px);opacity:0;pointer-events:none;
      background:#f4f7fb;color:#08111f;padding:10px 18px;border-radius:999px;font-weight:750;z-index:200;
      box-shadow:0 12px 30px rgba(0,0,0,.38);transition:.22s ease;white-space:nowrap}
    .floating-toast.show{opacity:1;transform:translate(-50%,0)}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.68);display:grid;place-items:center;padding:20px;z-index:100}
    .modal-card{width:min(520px,100%);max-height:90vh;overflow:auto;background:#101b2d;border:1px solid var(--line);border-radius:18px;padding:22px}
    .modal-card h2{margin-top:0}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
    .report{background:#0d192a;border:1px solid var(--line);border-radius:12px;padding:12px;line-height:1.8}
    .mobile-tabbar{display:none}
    @media(max-width:900px){
      .topbar{height:auto;flex-wrap:wrap;padding:14px}.brand{width:100%;font-size:24px}.search-wrap{order:3;max-width:none;width:100%}.top-actions{position:absolute;right:12px;top:14px}
      .search{height:56px;border-radius:16px;padding:0 62px 0 48px;font-size:22px}
      .search-icon{left:16px;top:17px;font-size:22px}
      .search-back{display:flex;right:7px;top:7px;width:46px;height:42px}
      .layout{grid-template-columns:1fr;padding:10px;padding-bottom:82px}.sidebar,.detail{display:none}.layout.show-folders .sidebar{display:flex}.layout.show-detail .list-panel{display:none}.layout.show-detail .detail{display:flex}
      .panel{border-radius:14px}.toolbar .desktop-only,.desktop-only{display:none!important}
      .toolbar{padding:14px}.btn{height:44px;font-size:16px}.status{font-size:15px}
      .items{padding:12px}.item{padding:16px 14px;margin-bottom:10px;border-radius:14px}.item .icon{width:44px;height:44px;font-size:19px}
      .item-title{font-size:24px}.item-sub{font-size:17px;line-height:1.35;margin-top:6px}.folder{padding:14px 12px;font-size:18px}.panel-head{font-size:18px}
      .detail-title{font-size:28px}.field label{font-size:14px}.value,.edit-input,.edit-textarea,.edit-select{font-size:20px;min-height:52px}
      .meta{font-size:14px}.notice{margin:10px;font-size:15px}
      .mobile-tabbar{display:grid;grid-template-columns:repeat(3,1fr);position:fixed;bottom:0;left:0;right:0;height:72px;background:#091525;border-top:1px solid var(--line);z-index:30;padding-bottom:env(safe-area-inset-bottom)}
      .mobile-tabbar button{border:none;background:transparent;color:var(--muted);font-size:14px}.mobile-tabbar button.active{color:var(--green)}
      .detail-body{padding:16px}
    }
  </style>
</head>
<body>
<div id="login" class="login">
  <div class="login-card">
    <h1>PassVault <span style="color:var(--green)">1.1.4</span></h1>
    <p>電腦可編輯、手機唯讀。密碼庫以 AES-GCM 加密後存放在你的 iCloud Drive；GitHub Pages 只放程式，不放密碼。</p>
    <div class="login-actions">
      <label class="file-label">開啟加密密碼庫（.pvault）
        <input id="vaultFile" type="file" accept=".pvault,application/json">
      </label>
      <label class="file-label">匯入 .HTML
        <input id="legacyFile" type="file" accept=".html,text/html">
      </label>
      <button id="newVaultBtn" class="btn ghost">建立新的空白密碼庫</button>
    </div>
    <div id="unlockBox" class="hidden">
      <div class="pass-row">
        <input id="masterPassword" type="password" placeholder="輸入主密碼">
        <button id="unlockBtn" class="btn primary">解鎖</button>
      </div>
      <p id="loginMsg" class="small"></p>
    </div>
    <p class="small">提醒：主密碼不會儲存在檔案中，忘記後無法復原。</p>
  </div>
</div>

<div id="app" class="app hidden">
  <header class="topbar">
    <div class="brand">PassVault<span>1.1.2</span><small class="version" id="modeLabel"></small></div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="searchInput" class="search" placeholder="搜尋標題、帳號、備註">
      <button id="backToFoldersBtn" class="search-back" type="button" aria-label="返回上一層" title="返回上一層">
        <svg class="return-arrow-icon" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M13 7 5 15l8 8v-5h7.5c4.7 0 7.5 2.5 7.5 7.2V27h-4v-1.8c0-2.5-1-3.2-3.5-3.2H13v5L2 15 13 3v4Z"></path>
        </svg>
      </button>
    </div>
    <div class="top-actions">
      <button id="addBtn" class="btn primary desktop-only">＋ 新增</button>
      <button id="saveBtn" class="btn desktop-only">匯出備份</button>
      <button id="lockBtn" class="btn ghost">鎖定</button>
    </div>
  </header>

  <main id="layout" class="layout">
    <aside class="panel sidebar">
      <div class="panel-head">分類</div>
      <div id="folders" class="folders"></div>
    </aside>

    <section class="panel list-panel">
      <div class="toolbar">
        <button id="allFilter" class="btn">全部</button>
        <button id="favFilter" class="btn">常用</button>
        <span id="countStatus" class="status"></span>
      </div>
      <div id="items" class="items"></div>
    </section>

    <section class="panel detail">
      <div id="detailBody" class="detail-body">
        <div class="detail-empty">選擇一筆帳號<br>即可查看詳細內容</div>
      </div>
    </section>
  </main>

  <nav class="mobile-tabbar">
    <button data-tab="folders">分類</button>
    <button data-tab="list" class="active">帳號</button>
    <button data-tab="detail">詳細</button>
  </nav>
</div>

<div id="modal" class="modal hidden"><div class="modal-card" id="modalCard"></div></div>

<script>
const APP_VERSION="1.1.4", SCHEMA_VERSION=1, MOBILE_BREAKPOINT=900;
const encoder=new TextEncoder(), decoder=new TextDecoder();
let vault=null, selectedId=null, currentFolder="all", onlyFav=false, dirty=false, unlockPayload=null, masterKeyPassword="";
let readonlyMode=window.matchMedia(`(max-width:${MOBILE_BREAKPOINT}px)`).matches;

const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const nowIso=()=>new Date().toISOString();
const uid=()=>crypto.randomUUID?crypto.randomUUID():"id-"+Date.now()+"-"+Math.random().toString(16).slice(2);
const escapeHTML=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
const iconText=t=>(t||"?").trim().slice(0,1).toUpperCase();
function highlightMatch(text,q){
  const base=String(text??"");
  if(!q) return escapeHTML(base||"未命名");
  const safe=escapeHTML(base);
  const escapedQ=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return safe.replace(new RegExp(escapedQ,'gi'),m=>`<mark>${m}</mark>`);
}
function folderNameById(id){return vault?.folders?.find(f=>f.id===id)?.name||""}

function emptyVault(){
  return {schemaVersion:SCHEMA_VERSION,appVersion:APP_VERSION,createdAt:nowIso(),updatedAt:nowIso(),
    folders:[{id:"personal",name:"個人帳號"},{id:"work",name:"工作帳號"},{id:"finance",name:"金融服務"}],items:[]};
}
function setMsg(msg,type=""){
  const el=$("#loginMsg"); el.textContent=msg; el.className="small "+(type==="bad"?"danger-text":type==="good"?"good-text":"");
}
function bytesToB64(bytes){let s="";bytes.forEach(b=>s+=String.fromCharCode(b));return btoa(s)}
function b64ToBytes(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function deriveKey(password,salt,iterations=250000){
  const base=await crypto.subtle.importKey("raw",encoder.encode(password),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}
async function encryptVault(data,password){
  const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));
  const iterations=250000,key=await deriveKey(password,salt,iterations);
  const plain=encoder.encode(JSON.stringify(data));
  const cipher=new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM",iv},key,plain));
  return {format:"passvault",schemaVersion:1,appVersion:APP_VERSION,kdf:"PBKDF2-SHA256",iterations,
    cipher:"AES-GCM",salt:bytesToB64(salt),iv:bytesToB64(iv),data:bytesToB64(cipher)};
}
async function decryptVault(payload,password){
  const key=await deriveKey(password,b64ToBytes(payload.salt),payload.iterations||250000);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(payload.iv)},key,b64ToBytes(payload.data));
  return JSON.parse(decoder.decode(plain));
}
function normalizeVault(v){
  if(!v||typeof v!=="object")throw new Error("資料格式錯誤");
  v.schemaVersion=SCHEMA_VERSION;v.appVersion=APP_VERSION;
  v.folders=Array.isArray(v.folders)?v.folders:[];
  v.items=Array.isArray(v.items)?v.items:[];
  v.items=v.items.map(x=>({id:x.id||uid(),title:x.title||"",account:x.account||"",password:x.password||"",url:x.url||"",
    notes:x.notes||"",folderId:x.folderId||"",favorite:!!x.favorite,createdAt:x.createdAt||nowIso(),updatedAt:x.updatedAt||nowIso()}));
  return v;
}
function convertLegacy(appData){
  const folders=[],items=[],seen=new Set(),columnMap={};
  const order=["col-uncategorized",...(appData.columnOrder||[])];
  order.forEach(cid=>{
    const c=appData.columns?.[cid];if(!c)return;
    const fid=cid==="col-uncategorized"?"uncategorized":cid;
    columnMap[cid]=fid;folders.push({id:fid,name:c.title||"未命名分類"});
    (c.taskIds||[]).forEach(tid=>{
      const t=appData.tasks?.[tid];if(!t||seen.has(tid))return;seen.add(tid);
      items.push({id:t.id||uid(),title:t.title||"",account:t.account||"",password:t.password||"",url:"",
        notes:t.notes||"",folderId:fid,favorite:false,createdAt:nowIso(),updatedAt:nowIso()});
    });
  });
  Object.values(appData.tasks||{}).forEach(t=>{
    if(seen.has(t.id))return;
    items.push({id:t.id||uid(),title:t.title||"",account:t.account||"",password:t.password||"",url:"",
      notes:t.notes||"",folderId:"uncategorized",favorite:false,createdAt:nowIso(),updatedAt:nowIso()});
  });
  if(!folders.some(f=>f.id==="uncategorized"))folders.unshift({id:"uncategorized",name:"未分類"});
  return {schemaVersion:1,appVersion:APP_VERSION,createdAt:nowIso(),updatedAt:nowIso(),folders,items};
}
function showApp(){
  $("#login").classList.add("hidden");$("#app").classList.remove("hidden");
  $("#modeLabel").textContent=`${APP_VERSION} · ${readonlyMode?"手機唯讀":"電腦編輯"}`;
  $("#addBtn").classList.toggle("hidden",readonlyMode);$("#saveBtn").classList.toggle("hidden",readonlyMode);
  if(readonlyMode && innerWidth<=MOBILE_BREAKPOINT){
    selectedId=null;
    currentFolder="all";
    onlyFav=false;
    $("#searchInput").value="";
    mobileTab("folders");
  }
  render();
}
function lockApp(){
  vault=null;selectedId=null;masterKeyPassword="";unlockPayload=null;dirty=false;
  $("#app").classList.add("hidden");$("#login").classList.remove("hidden");$("#unlockBox").classList.add("hidden");
  $("#masterPassword").value="";setMsg("");
}
function render(){
  renderFolders();renderItems();renderDetail();
  const q=$("#searchInput").value.trim();
  $("#countStatus").textContent=q
    ? `找到 ${filteredItems().length} 筆結果${dirty&&!readonlyMode?" · 尚未匯出":""}`
    : `${filteredItems().length} / ${vault.items.length} 筆${dirty&&!readonlyMode?" · 尚未匯出":""}`;
}
function filteredItems(){
  const q=$("#searchInput").value.trim().toLowerCase();
  const hasQuery=!!q;
  return vault.items.filter(i=>{
    if(!hasQuery && currentFolder!=="all" && i.folderId!==currentFolder)return false;
    if(onlyFav&&!i.favorite)return false;
    if(!hasQuery)return true;
    const folderName=folderNameById(i.folderId);
    return [i.title,i.account,i.notes,folderName].some(x=>(x||"").toLowerCase().includes(q));
  }).sort((a,b)=>(b.favorite-a.favorite)||a.title.localeCompare(b.title,"zh-Hant"));
}
function renderFolders(){
  const counts={};vault.items.forEach(i=>counts[i.folderId]=(counts[i.folderId]||0)+1);
  let html=`<button class="folder ${currentFolder==="all"?"active":""}" data-folder="all"><span>所有項目</span><small>${vault.items.length}</small></button>`;
  vault.folders.forEach(f=>html+=`<button class="folder ${currentFolder===f.id?"active":""}" data-folder="${escapeHTML(f.id)}"><span>${escapeHTML(f.name)}</span><small>${counts[f.id]||0}</small></button>`);
  $("#folders").innerHTML=html;
  $$("#folders .folder").forEach(b=>b.onclick=()=>{currentFolder=b.dataset.folder;mobileTab("list");render()});
}
function renderItems(){
  const arr=filteredItems();
  const q=$("#searchInput").value.trim();
  $("#items").innerHTML=arr.length?arr.map(i=>{
    const subText=i.account||i.notes||"尚未填寫帳號";
    return `<div class="item ${selectedId===i.id?"active":""}" data-id="${escapeHTML(i.id)}">
      <div class="icon">${escapeHTML(iconText(i.title))}</div>
      <div class="item-main">
        <div class="item-title">${highlightMatch(i.title||"未命名",q)}</div>
        <div class="item-sub">${highlightMatch(subText,q)}</div>
      </div>
      ${i.favorite?'<span class="star">★</span>':""}
    </div>`;
  }).join("")
    :`<div class="detail-empty">找不到符合條件的項目</div>`;
  $$("#items .item").forEach(el=>el.onclick=()=>{selectedId=el.dataset.id;mobileTab("detail");render()});
}
function renderDetail(){
  const box=$("#detailBody"),i=vault.items.find(x=>x.id===selectedId);
  if(!i){box.innerHTML='<div class="detail-empty">選擇一筆帳號<br>即可查看詳細內容</div>';return}
  if(readonlyMode){renderReadonly(box,i);return}
  renderEdit(box,i);
}
function renderReadonly(box,i){
  box.innerHTML=`<div class="detail-title-row"><div class="detail-title">${escapeHTML(i.title||"未命名")}</div><button class="icon-btn" id="favBtn">${i.favorite?"★":"☆"}</button></div>
    ${viewField("帳號",i.account,"account",true)}
    ${viewField("密碼","••••••••••••","password",true,true)}
    ${viewField("備註",i.notes,"notes",false)}
    <div class="meta">最後更新：${new Date(i.updatedAt).toLocaleString()}<br>資料只在本機瀏覽器記憶體解密顯示。</div>`;
  $("#favBtn").disabled=true;
  bindViewButtons(i);
}
function viewField(label,value,key,copyable,reveal=false){
  return `<div class="field"><label>${label}</label><div class="value-row"><div class="value ${key==="password"?"mono":""}" id="val-${key}">${escapeHTML(value||"—")}</div>
  ${reveal?`<button class="icon-btn" data-action="reveal" title="顯示">👁</button>`:""}
  ${copyable?`<button class="icon-btn" data-copy="${key}" title="複製">⧉</button>`:""}</div></div>`;
}
function bindViewButtons(i){
  $$("[data-copy]").forEach(b=>b.onclick=()=>copyText(i[b.dataset.copy]||""));
  const r=$('[data-action="reveal"]');if(r)r.onclick=()=>{
    const el=$("#val-password");el.textContent=i.password||"—";setTimeout(()=>{if(el)el.textContent="••••••••••••"},12000);
  };
}
function renderEdit(box,i){
  const opts=vault.folders.map(f=>`<option value="${escapeHTML(f.id)}" ${i.folderId===f.id?"selected":""}>${escapeHTML(f.name)}</option>`).join("");
  box.innerHTML=`<div class="detail-title-row"><input class="edit-input" data-field="title" value="${escapeHTML(i.title)}" placeholder="標題">
    <button class="icon-btn" id="favBtn">${i.favorite?"★":"☆"}</button><button class="icon-btn" id="deleteBtn">✕</button></div>
    <div class="field"><label>分類</label><select class="edit-select" data-field="folderId">${opts}</select></div>
    ${editField("帳號","account",i.account)}
    ${editField("密碼","password",i.password,true)}
    <div class="field"><label>備註</label><textarea class="edit-textarea" data-field="notes">${escapeHTML(i.notes)}</textarea></div>
    <div class="meta">建立：${new Date(i.createdAt).toLocaleString()}<br>最後更新：${new Date(i.updatedAt).toLocaleString()}</div>`;
  $$("[data-field]").forEach(el=>el.oninput=()=>{
    i[el.dataset.field]=el.value;i.updatedAt=nowIso();vault.updatedAt=nowIso();dirty=true;renderItems();
    const q=$("#searchInput").value.trim();
    $("#countStatus").textContent=q?`找到 ${filteredItems().length} 筆結果 · 尚未匯出`:`${filteredItems().length} / ${vault.items.length} 筆 · 尚未匯出`;
  });
  $("#favBtn").onclick=()=>{i.favorite=!i.favorite;i.updatedAt=nowIso();dirty=true;render()};
  $("#deleteBtn").onclick=()=>confirm("確定刪除這筆帳密？")&&(vault.items=vault.items.filter(x=>x.id!==i.id),selectedId=null,dirty=true,render());
  $$("[data-copy]").forEach(b=>b.onclick=()=>copyText(i[b.dataset.copy]||""));
  $$("[data-toggle-password]").forEach(button=>{
    button.onclick=()=>{
      const row=button.closest(".value-row");
      const input=row?.querySelector('input[data-field="password"]');
      if(!input)return;
      const willShow=input.type==="password";
      input.type=willShow?"text":"password";
      button.textContent=willShow?"🙈":"👁";
      button.title=willShow?"隱藏密碼":"顯示密碼";
      input.focus({preventScroll:true});
      const end=input.value.length;
      try{input.setSelectionRange(end,end)}catch(e){}
    };
  });
}
function editField(label,key,value,password=false){
  return `<div class="field"><label>${label}</label><div class="value-row"><input ${password?'type="password"':'type="text"'} class="edit-input ${password?"mono":""}" data-field="${key}" value="${escapeHTML(value)}">
  ${password?`<button class="icon-btn" data-toggle-password="${key}" title="顯示／隱藏">👁</button>`:""}
  <button class="icon-btn" data-copy="${key}">⧉</button></div></div>`;
}
async function copyText(text){
  if(!text)return;try{await navigator.clipboard.writeText(text);toast("已複製")}catch{toast("瀏覽器無法使用剪貼簿")}
}
function toast(msg){
  let t=document.getElementById("floatingToast");
  if(!t){t=document.createElement("div");t.id="floatingToast";t.className="floating-toast";document.body.appendChild(t)}
  t.textContent=msg;t.classList.add("show");clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove("show"),1800);
}
function mobileTab(tab){
  if(innerWidth>MOBILE_BREAKPOINT)return;
  const l=$("#layout");l.classList.remove("show-folders","show-detail");
  if(tab==="folders")l.classList.add("show-folders");if(tab==="detail")l.classList.add("show-detail");
  $$(".mobile-tabbar button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
}
function openModal(html){$("#modalCard").innerHTML=html;$("#modal").classList.remove("hidden")}
function closeModal(){$("#modal").classList.add("hidden")}
function addItem(){
  const folder=currentFolder==="all"?(vault.folders[0]?.id||""):currentFolder;
  const i={id:uid(),title:"",account:"",password:"",notes:"",folderId:folder,favorite:false,createdAt:nowIso(),updatedAt:nowIso()};
  vault.items.unshift(i);selectedId=i.id;dirty=true;render();
}
async function exportVault(){
  if(!masterKeyPassword){
    openModal(`<h2>設定主密碼</h2><p class="small">請輸入至少 10 個字元。主密碼不會儲存在檔案中。</p>
    <input id="newPass" class="edit-input" type="password" placeholder="主密碼">
    <input id="newPass2" class="edit-input" type="password" placeholder="再次輸入" style="margin-top:10px">
    <div class="modal-actions"><button class="btn" onclick="closeModal()">取消</button><button id="confirmExport" class="btn primary">加密並匯出</button></div>`);
    $("#confirmExport").onclick=async()=>{
      const a=$("#newPass").value,b=$("#newPass2").value;if(a.length<10)return alert("主密碼至少 10 個字元");if(a!==b)return alert("兩次密碼不一致");
      masterKeyPassword=a;closeModal();await doExport();
    };return;
  }
  await doExport();
}
async function doExport(){
  vault.updatedAt=nowIso();const payload=await encryptVault(vault,masterKeyPassword);
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a"),date=new Date().toISOString().slice(0,10).replaceAll("-","");
  a.href=URL.createObjectURL(blob);a.download=`PassVault_${date}.pvault`;a.click();URL.revokeObjectURL(a.href);dirty=false;render();toast("已匯出加密備份");
}
async function readText(file){return await file.text()}
async function handleVaultFile(file){
  try{
    unlockPayload=JSON.parse(await readText(file));
    if(unlockPayload.format!=="passvault")throw new Error();
    $("#unlockBox").classList.remove("hidden");setMsg(`已選擇：${file.name}`,"good");$("#masterPassword").focus();
  }catch{setMsg("這不是有效的 .pvault 檔案","bad")}
}
async function handleLegacyFile(file){
  try{
    const doc=new DOMParser().parseFromString(await readText(file),"text/html");
    const node=doc.getElementById("embedded-data");if(!node)throw new Error("找不到 embedded-data");
    const legacy=JSON.parse(node.textContent);const converted=convertLegacy(legacy);
    const oldCount=Object.keys(legacy.tasks||{}).length,newCount=converted.items.length;
    openModal(`<h2>舊版資料轉換完成</h2><div class="report">舊版帳密：${oldCount} 筆<br>新版帳密：${newCount} 筆<br>分類：${converted.folders.length} 個<br>遺失：${Math.max(0,oldCount-newCount)} 筆</div>
    <p class="small">原始 HTML 不會被修改。確認後只會在瀏覽器記憶體中開啟，之後請匯出新的加密 .pvault。</p>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">取消</button><button id="acceptLegacy" class="btn primary">開啟轉換結果</button></div>`);
    $("#acceptLegacy").onclick=()=>{vault=normalizeVault(converted);masterKeyPassword="";dirty=true;closeModal();showApp()};
  }catch(e){setMsg("讀取舊版失敗："+e.message,"bad")}
}
$("#vaultFile").onchange=e=>e.target.files[0]&&handleVaultFile(e.target.files[0]);
$("#legacyFile").onchange=e=>e.target.files[0]&&handleLegacyFile(e.target.files[0]);
$("#unlockBtn").onclick=async()=>{
  const p=$("#masterPassword").value;if(!p)return setMsg("請輸入主密碼","bad");
  try{vault=normalizeVault(await decryptVault(unlockPayload,p));masterKeyPassword=p;dirty=false;showApp()}
  catch{setMsg("主密碼錯誤，或檔案已損毀","bad")}
};
$("#masterPassword").onkeydown=e=>e.key==="Enter"&&$("#unlockBtn").click();
$("#newVaultBtn").onclick=()=>{vault=emptyVault();masterKeyPassword="";dirty=true;showApp()};
$("#searchInput").oninput=()=>{ if(readonlyMode&&innerWidth<=MOBILE_BREAKPOINT) mobileTab("list"); render(); };
$("#backToFoldersBtn").onclick=()=>{
  $("#searchInput").value="";
  currentFolder="all";
  onlyFav=false;
  selectedId=null;
  mobileTab("folders");
  render();
};
$("#allFilter").onclick=()=>{onlyFav=false;render()};$("#favFilter").onclick=()=>{onlyFav=true;render()};
$("#addBtn").onclick=addItem;$("#saveBtn").onclick=exportVault;$("#lockBtn").onclick=()=>{if(dirty&&!confirm("尚未匯出最新修改，仍要鎖定嗎？"))return;lockApp()};
$$(".mobile-tabbar button").forEach(b=>b.onclick=()=>mobileTab(b.dataset.tab));
$("#modal").onclick=e=>{if(e.target===$("#modal"))closeModal()};
document.addEventListener("visibilitychange",()=>{if(document.hidden&&readonlyMode&&vault)setTimeout(()=>{if(document.hidden)lockApp()},30000)});
window.addEventListener("beforeunload",e=>{if(dirty&&!readonlyMode){e.preventDefault();e.returnValue=""}});
window.closeModal=closeModal;
</script>
</body>
</html>
